name: nusantara_lore
description: "Ensiklopedia Digital Budaya Nusantara - Jelajahi Warisan, Hidupkan Legenda"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # Database
  hive_flutter: ^1.1.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0

  # Auth & Security
  local_auth: ^2.2.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0

  # LBS & Maps
  geolocator: ^11.0.0
  google_maps_flutter: ^2.6.0
  geocoding: ^3.0.0

  # Sensor
  sensors_plus: ^4.0.0
  camera: ^0.10.0

  # AI / LLM
  google_generative_ai: ^0.4.0

  # Network
  dio: ^5.4.0
  connectivity_plus: ^5.0.0

  # Notifikasi
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0

  # Game Engine
  flame: ^1.15.0

  # UI
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.0
  lottie: ^3.0.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.0
  shared_preferences: ^2.2.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/images/
    - .env
